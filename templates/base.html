<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}KDP Press Check{% endblock %}</title>
  <meta name="description" content="Check a paperback manuscript PDF against Amazon KDP's print specifications before you upload it.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("kdp-theme");
        var theme = (saved === "light" || saved === "dark")
          ? saved
          : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <span class="crop-tick tl" aria-hidden="true"></span>
  <span class="crop-tick tr" aria-hidden="true"></span>
  <span class="crop-tick bl" aria-hidden="true"></span>
  <span class="crop-tick br" aria-hidden="true"></span>

  <div class="wrap">
    <header class="masthead">
      <a href="{{ url_for('index') }}" class="mark" style="text-decoration:none; color:inherit;">
        KDP Press Check<span class="dot">.</span>
      </a>
      <div class="masthead-right">
        <nav class="mode-nav">
          <a href="{{ url_for('index') }}" class="{{ 'is-active' if active_mode == 'interior' else '' }}">Interior</a>
          <a href="{{ url_for('cover_index') }}" class="{{ 'is-active' if active_mode == 'cover' else '' }}">Cover</a>
          <a href="{{ url_for('kindle_index') }}" class="{{ 'is-active' if active_mode == 'kindle' else '' }}">Kindle</a>
          <a href="{{ url_for('preview_index') }}" class="{{ 'is-active' if active_mode == 'preview' else '' }}">Preview</a>
        </nav>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch to dark mode" aria-pressed="false">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 2.5v2.4M12 19.1v2.4M4.4 4.4l1.7 1.7M17.9 17.9l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.4 19.6l1.7-1.7M17.9 6.1l1.7-1.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash" role="alert">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
              <path d="M12 8v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="16" r="1" fill="currentColor"/>
            </svg>
            <span>{{ m }}</span>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="{{ url_for('static', filename='theme.js') }}"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
